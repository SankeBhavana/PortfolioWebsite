<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#050505] text-white overflow-x-hidden">

<main class="relative min-h-screen pt-32 pb-20">

  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 w-full z-50 border-b border-white/10 bg-[#050505]/40 backdrop-blur-xl">
    <div class="flex justify-between items-center h-20 px-8 max-w-[1400px] mx-auto">

      <div class="text-xl font-black tracking-widest text-white italic">
        Bhavana Sanke
      </div>

      <div class="hidden md:flex gap-8 uppercase text-xs text-slate-400">
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="techstack.html">Tech Stack</a>
        <a href="contact.html" class="text-white">Contact</a>
      </div>

      <a href="contact.html">
        <button class="px-6 py-2 rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600">
          Let's Build
        </button>
      </a>

    </div>
  </nav>

  <!-- GLOW -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-1/4 -left-64 w-[600px] h-[600px] bg-violet-500/10 blur-3xl rounded-full"></div>
    <div class="absolute bottom-1/4 -right-64 w-[600px] h-[600px] bg-fuchsia-500/10 blur-3xl rounded-full"></div>
  </div>

  <section class="max-w-7xl mx-auto px-8 relative z-10">

    <!-- HERO -->
    <div class="mb-12">
      <h1 class="text-5xl font-bold mb-4">
        Let's build something amazing
      </h1>
      <p class="text-white/60">
        Send me a message and I’ll get back to you.
      </p>
    </div>

    <div class="grid lg:grid-cols-12 gap-8">

      <!-- FORM -->
      <div class="lg:col-span-7">
        <div class="bg-white/5 border border-white/10 p-8 rounded-xl">

          <!-- ✅ FORM CONNECTED -->
          <form action="https://formspree.io/f/xbdqwygq" method="POST" class="space-y-6">

            <!-- Hidden -->
            <input type="hidden" name="_subject" value="New Portfolio Contact Message">
            <input type="hidden" name="_captcha" value="false">

            <div class="grid md:grid-cols-2 gap-6">

              <input type="text" name="name" required
                placeholder="Full Name"
                class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-4">

              <input type="email" name="email" required
                placeholder="Email Address"
                class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-4">

            </div>

            <select name="service"
              class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-4">
              <option>React Development</option>
              <option>WordPress Development</option>
              <option>Full Stack Project</option>
              <option>Other</option>
            </select>

            <textarea name="message" required rows="6"
              placeholder="Tell me about your project..."
              class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-4"></textarea>

            <button type="submit"
              class="w-full bg-gradient-to-r from-violet-500 to-fuchsia-500 py-4 rounded-full font-bold">
              Send Message
            </button>

          </form>
        </div>
      </div>

      <!-- CONTACT INFO -->
      <div class="lg:col-span-5 space-y-6">

        <div class="p-6 bg-white/5 border border-white/10 rounded-xl">
          <p class="text-xs text-white/40">Email</p>
          <p class="mt-2">sankebhavana1@gmail.com</p>
        </div>

        <div class="p-6 bg-white/5 border border-white/10 rounded-xl">
          <p class="text-xs text-white/40">Connect</p>
          <a href="https://github.com/SankeBhavana" target="_blank">GitHub</a><br>
          <a href="https://linkedin.com" target="_blank">LinkedIn</a>
        </div>

      </div>

    </div>

  </section>

</main>

</body>
</html>
